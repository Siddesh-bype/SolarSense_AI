version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/scan_outputs:/app/scan_outputs
    env_file:
      - .env
    environment:
      - PVGIS_OFFLINE_MODE=true
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
